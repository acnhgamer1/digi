<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bob – Talking AI Assistant</title>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>
  <main class="container">
    <h1>Bob</h1>
    <p class="subtitle">A talking AI assistant powered by Pollinations.AI</p>

    <section class="controls">
      <button id="recordBtn">Start Recording</button>
      <span id="status" aria-live="polite"></span>
    </section>

    <section class="content">
      <div class="panel">
        <h2>Your Speech (Transcribed)</h2>
        <div id="transcript" class="box" tabindex="0"></div>
      </div>
      <div class="panel">
        <h2>Bob&apos;s Response</h2>
        <div id="response" class="box" tabindex="0"></div>
      </div>
    </section>

    <section class="config">
      <details>
        <summary>Settings</summary>
        <label>
          TTS Voice:
          <select id="voice">
            <option value="alloy" selected>alloy</option>
            <option value="verse">verse</option>
            <option value="aria">aria</option>
            <option value="ballad">ballad</option>
            <option value="other">other</option>
          </select>
        </label>
        <label>
          System Prompt:
          <textarea id="systemPrompt" rows="3" placeholder="You are Bob, a helpful, friendly assistant. Keep responses short and speak clearly."></textarea>
        </label>
      </details>
    </section>

    <section class="log">
      <details>
        <summary>Debug Log</summary>
        <pre id="log"></pre>
      </details>
    </section>

    <footer>
      <p>Uses Pollinations.AI for Speech-to-Text, Text Generation, and Text-to-Speech.</p>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
